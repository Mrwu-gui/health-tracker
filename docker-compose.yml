version: "3.8"

services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.3
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: health_tracker
    volumes:
      - ./docker/mysql:/var/lib/mysql
      - ./health-tracker-java/src/main/resources/db:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"

  redis:
    image: docker.m.daocloud.io/library/redis:7
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./health-tracker-java
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/health_tracker?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  web:
    build:
      context: ./health-tracker-web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

  miniapp:
    build:
      context: ./health-tracker-miniapp
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3101:80"
    depends_on:
      - backend

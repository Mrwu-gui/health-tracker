openapi: 3.0.0
info:
  title: 健康管理小程序 API
  version: 1.0.0
  description: 供腾讯元器插件导入的 OpenAPI 文档（简化版）

servers:
  - url: "http://139.196.155.234:8080"
    description: "生产环境 API 服务器"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
    ReminderAddRequest:
      type: object
      required: [userId, title, type, remindTime]
      properties:
        userId:
          type: integer
        title:
          type: string
        type:
          type: integer
          description: "1=运动,2=饮食,3=睡眠"
        content:
          type: string
        remindTime:
          type: string
          example: "2026-03-15 20:30:00"
    GoalAddRequest:
      type: object
      required: [userId, goalType, targetValue, period]
      properties:
        userId:
          type: integer
        goalType:
          type: integer
          description: "1=步数,2=睡眠,3=饮食热量"
        targetValue:
          type: number
        currentValue:
          type: number
        period:
          type: string
          example: day
    MedicationAddRequest:
      type: object
      required: [userId, drugName, dosage, frequency]
      properties:
        userId:
          type: integer
        drugName:
          type: string
        dosage:
          type: string
        frequency:
          type: string
        remindTime:
          type: string
          example: "08:00"
        startDate:
          type: string
          example: "2026-03-15"
    FamilyAddRequest:
      type: object
      required: [userId, name, relation]
      properties:
        userId:
          type: integer
        name:
          type: string
        relation:
          type: string
        age:
          type: integer
        conditionText:
          type: string
    AiChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        imageUrl:
          type: string
        audioUrl:
          type: string
        store:
          type: boolean

security:
  - bearerAuth: []

paths:
  /api/auth/mini/login:
    post:
      summary: 微信登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/auth/mini/werun:
    post:
      summary: 微信步数同步
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, encryptedData, iv]
              properties:
                code:
                  type: string
                encryptedData:
                  type: string
                iv:
                  type: string
      responses:
        "200":
          description: 同步成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/user/profile:
    get:
      summary: 获取用户资料
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/user/profile/update:
    post:
      summary: 更新用户资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: integer
                wxNickname:
                  type: string
                wxAvatar:
                  type: string
                sex:
                  type: string
                age:
                  type: integer
                height:
                  type: number
                weight:
                  type: number
                systolic:
                  type: integer
                diastolic:
                  type: integer
                heartRate:
                  type: integer
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/statistics/overview:
    get:
      summary: 数据总览
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
        - in: query
          name: period
          required: true
          schema:
            type: string
            example: day
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/reminder/list:
    get:
      summary: 提醒列表
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/reminder/add:
    post:
      summary: 新增提醒
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderAddRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/reminder/update:
    post:
      summary: 更新提醒
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ReminderAddRequest"
                - type: object
                  required: [id]
                  properties:
                    id:
                      type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/goal/list:
    get:
      summary: 目标列表
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
        - in: query
          name: period
          required: true
          schema:
            type: string
            example: day
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/goal/add:
    post:
      summary: 新增目标
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalAddRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/goal/update:
    post:
      summary: 更新目标
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/GoalAddRequest"
                - type: object
                  required: [id]
                  properties:
                    id:
                      type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/medication/list:
    get:
      summary: 用药列表
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/medication/add:
    post:
      summary: 新增用药
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationAddRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/medication/update:
    post:
      summary: 更新用药
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/MedicationAddRequest"
                - type: object
                  required: [id]
                  properties:
                    id:
                      type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/family/list:
    get:
      summary: 家庭成员列表
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/family/add:
    post:
      summary: 新增家庭成员
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyAddRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/family/update:
    post:
      summary: 更新家庭成员
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/FamilyAddRequest"
                - type: object
                  required: [id]
                  properties:
                    id:
                      type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/chat:
    post:
      summary: AI 对话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/history:
    get:
      summary: AI 历史记录
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/upload:
    post:
      summary: AI 文件上传
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/weight/add:
    post:
      summary: 体重记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, weight, date]
              properties:
                userId:
                  type: integer
                weight:
                  type: number
                bmi:
                  type: number
                date:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/health-record/add:
    post:
      summary: 血压心率记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, systolic, diastolic, date]
              properties:
                userId:
                  type: integer
                systolic:
                  type: integer
                diastolic:
                  type: integer
                heartRate:
                  type: integer
                date:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/diet/add:
    post:
      summary: 饮食记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, mealType, foodName, calories, date]
              properties:
                userId:
                  type: integer
                mealType:
                  type: string
                foodName:
                  type: string
                calories:
                  type: number
                protein:
                  type: number
                carbs:
                  type: number
                fat:
                  type: number
                note:
                  type: string
                date:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/sleep/add:
    post:
      summary: 睡眠记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, startTime, endTime]
              properties:
                userId:
                  type: integer
                startTime:
                  type: string
                endTime:
                  type: string
                deepSleepMinutes:
                  type: integer
                lightSleepMinutes:
                  type: integer
                quality:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/exercise/add:
    post:
      summary: 运动记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, type, steps, date]
              properties:
                userId:
                  type: integer
                type:
                  type: string
                steps:
                  type: integer
                duration:
                  type: integer
                calories:
                  type: number
                date:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

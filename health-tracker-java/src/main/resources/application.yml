server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/health_tracker?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:change_this_secret_key_please_32_chars_min}
  expiration-minutes: 1440

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/docs-ui
logging:
  file:
    name: logs/app.log
security:
  dev-relaxed: ${SECURITY_DEV_RELAXED:false}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

wechat:
  mini:
    appid: ${WECHAT_MINI_APPID:wx4d5635b224dd6e22}
    secret: ${WECHAT_MINI_SECRET:13fec31d4dad98659de962e8060de5e7}
    template-id: ${WECHAT_MINI_TEMPLATE_ID:}
    sleep-template-id: ${WECHAT_MINI_TEMPLATE_SLEEP_ID:99UN5VNoIf_2eEH1r1AuxY2fTeXQurSDucD-dZgy-ZE}
    exercise-template-id: ${WECHAT_MINI_TEMPLATE_EXERCISE_ID:BW1-MP6TisjBwbMOEvA1j99pJ8XLPrMKKFyYPh_cchw}
    period-template-id: ${WECHAT_MINI_TEMPLATE_PERIOD_ID:tgrB0RlYGtbsyFnRv2yskI-daCieU9ATfmunmYM6JFw}
    medication-template-id: ${WECHAT_MINI_TEMPLATE_MEDICATION_ID:0bxQEB2rY1VMzlLk7C1L-gIXexSufnXICswP3Oi0S8w}
  web:
    appid: ${WECHAT_WEB_APPID:}
    secret: ${WECHAT_WEB_SECRET:}
    redirect-uri: ${WECHAT_WEB_REDIRECT_URI:}
  message:
    token: ${WECHAT_MSG_TOKEN:}
    aes-key: ${WECHAT_MSG_AES_KEY:}

sms:
  enabled: ${SMS_ENABLED:false}
  cooldown-seconds: ${SMS_COOLDOWN_SECONDS:60}
  aliyun:
    access-key-id: ${SMS_ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: ${SMS_ALIYUN_SIGN_NAME:健康管理}
    template-code: ${SMS_ALIYUN_TEMPLATE_CODE:}

yuanqi:
  base-url: ${YUANQI_BASE_URL:https://yuanqi.tencent.com}
  appid: ${YUANQI_APPID:}
  appkey: ${YUANQI_APPKEY:}

ai:
  provider: ${AI_PROVIDER:yuanqi}
  http:
    connect-timeout-seconds: ${AI_HTTP_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${AI_HTTP_READ_TIMEOUT_SECONDS:60}

dashscope:
  app-id: ${DASHSCOPE_APP_ID:}
  api-key: ${DASHSCOPE_API_KEY:}
  app-base-url: ${DASHSCOPE_APP_BASE_URL:https://dashscope.aliyuncs.com/api/v1/apps}
  compatible-base-url: ${DASHSCOPE_COMPATIBLE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  vision-model: ${DASHSCOPE_VISION_MODEL:qwen3-vl-flash}

tencent:
  asr:
    secret-id: ${TENCENT_ASR_SECRET_ID:}
    secret-key: ${TENCENT_ASR_SECRET_KEY:}
    region: ${TENCENT_ASR_REGION:ap-shanghai}
    engine-model-type: ${TENCENT_ASR_ENGINE_MODEL_TYPE:16k_zh}
    voice-format: ${TENCENT_ASR_VOICE_FORMAT:mp3}
    sub-service-type: ${TENCENT_ASR_SUB_SERVICE_TYPE:2}

admin:
  api-key: ${ADMIN_API_KEY:}

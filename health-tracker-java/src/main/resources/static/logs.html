<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后端日志</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #f6f7fb;
        color: #1f2933;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(30, 41, 59, 0.08);
        padding: 16px 18px;
        margin-bottom: 16px;
      }
      .title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px 0;
      }
      .sub {
        color: #64748b;
        font-size: 13px;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: center;
        margin-top: 12px;
      }
      label {
        font-size: 13px;
        color: #475569;
      }
      input {
        width: 100px;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #dbe1ea;
        font-size: 13px;
      }
      button {
        padding: 7px 12px;
        border-radius: 8px;
        border: 0;
        background: #2563eb;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: #e2e8f0;
        color: #1f2933;
      }
      .status {
        font-size: 12px;
        color: #94a3b8;
        margin-left: auto;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 12px;
        line-height: 1.6;
        background: #0b1220;
        color: #e2e8f0;
        padding: 16px;
        border-radius: 10px;
        max-height: 70vh;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">后端日志</div>
        <div class="sub">来源：/api/admin/logs/tail</div>
        <div class="controls">
          <label>
            行数
            <input id="lines" type="number" min="50" max="2000" value="200" />
          </label>
          <label>
            刷新间隔(秒)
            <input id="interval" type="number" min="1" max="60" value="5" />
          </label>
          <button id="refreshBtn">刷新</button>
          <button id="toggleBtn" class="secondary">暂停</button>
          <span class="status" id="status">未加载</span>
        </div>
      </div>

      <div class="card">
        <pre id="logBox">等待加载...</pre>
      </div>
    </div>

    <script>
      const logBox = document.getElementById("logBox");
      const statusEl = document.getElementById("status");
      const linesInput = document.getElementById("lines");
      const intervalInput = document.getElementById("interval");
      const refreshBtn = document.getElementById("refreshBtn");
      const toggleBtn = document.getElementById("toggleBtn");

      let timer = null;
      let running = true;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function fetchLogs() {
        const lines = Number(linesInput.value || 200);
        setStatus("加载中...");
        try {
          const res = await fetch(`/api/admin/logs/tail?lines=${lines}`, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          logBox.textContent = (data.lines || []).join("\n") || "暂无日志";
          const now = new Date();
          setStatus(`已更新 ${now.toLocaleTimeString()}`);
        } catch (err) {
          logBox.textContent = `日志加载失败：${err.message || err}`;
          setStatus("加载失败");
        }
      }

      function startTimer() {
        const seconds = Math.max(1, Number(intervalInput.value || 5));
        clearInterval(timer);
        timer = setInterval(fetchLogs, seconds * 1000);
      }

      refreshBtn.addEventListener("click", () => {
        fetchLogs();
      });

      toggleBtn.addEventListener("click", () => {
        running = !running;
        toggleBtn.textContent = running ? "暂停" : "继续";
        if (running) {
          fetchLogs();
          startTimer();
        } else {
          clearInterval(timer);
          setStatus("已暂停");
        }
      });

      intervalInput.addEventListener("change", () => {
        if (running) startTimer();
      });

      fetchLogs();
      startTimer();
    </script>
  </body>
</html>

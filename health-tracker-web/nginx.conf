server {
  listen 80;
  server_name datewell.xyz;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name datewell.xyz;

  ssl_certificate /etc/letsencrypt/live/datewell.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/datewell.xyz/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;
  resolver 10.89.0.1 valid=10s ipv6=off;
  set $backend_upstream backend;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://$backend_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://$backend_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /logs.html {
    proxy_pass http://$backend_upstream:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
